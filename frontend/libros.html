<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon">
    <link rel="stylesheet" href="./css/brite.css">
    <link rel="stylesheet" href="./css/estilos.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/libros.js"></script>
    <title>Registro de Libros</title>
</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./datos.html">Usuarios</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./formulario.html">Registrar Usuario</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link active" href="./libros.html">Registrar Libro</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./datosLibros.html">Libros</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <br>
    <div class="container">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">Registro de Libros</h3>
            </div>
            <div class="card-body">
                <p class="h5">Datos del Libro</p>
                <hr>
                <form id="formLibro">
                    <div class="row">
                        <div class="col">
                            <label for="titulo" class="form-label">
                                Título
                            </label>
                            <input
                                type="text"
                                id="titulo"
                                name="titulo"
                                class="form-control"
                                onchange="validarInput(this)">
                        </div>
                        <div class="col">
                            <label for="autor" class="form-label">
                                Autor
                            </label>
                            <input
                                type="text"
                                id="autor"
                                name="autor"
                                class="form-control"
                                onchange="validarInput(this)">
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label for="categoria" class="form-label">
                                Categoría
                            </label>
                            <input
                                type="text"
                                id="categoria"
                                name="categoria"
                                class="form-control"
                                onchange="validarInput(this)">
                        </div>
                        <div class="col">
                            <label for="anio" class="form-label">
                                Año
                            </label>
                            <input
                                type="number"
                                id="anio"
                                name="anio"
                                class="form-control"
                                onchange="validarInput(this)">
                        </div>
                    </div>
                    <br>
                    <div class="row">
                        <div class="col">
                            <label for="usuario" class="form-label">
                                Usuario
                            </label>
                            <select
                                id="usuario"
                                name="usuario"
                                class="form-select"
                                onchange="validarInput(this)">
                                <option value="">
                                    Seleccione un usuario...
                                </option>
                            </select>
                        </div>
                    </div>
                    <br>
                    <div class="text-end">
                        <button
                            type="reset"
                            class="btn btn-secondary me-2">
                            Cancelar
                        </button>
                        <button
                            type="button"
                            class="btn btn-primary"
                            onclick="guardarLibro()">
                            Guardar Libro
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>

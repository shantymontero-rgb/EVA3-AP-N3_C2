<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="shortcut icon" href="./assets/images/among_us_player_red_icon_156942.png" type="image/x-icon" />
    <link rel="stylesheet" href="./css/brite.css" />
    <link rel="stylesheet" href="./css/estilos.css" />

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./scripts/formulario.js"></script>

    <title>Formulario Registro</title>
</head>

<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark">
            <div class="container-fluid">
                <div class="collapse navbar-collapse" id="navbarColor01">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="./datos.html">Datos</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="./formulario.html">Formulario Registro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    <br />

    <div class="container">
        <p class="h3">Formulario de Registro</p>
        <br />
        <p class="h5">Datos Personales</p>
        <hr>
        <br>

        <form id="formularioRegistro">
            <div class="container">
                <div class="row">
                    <div class="col">
                        <label for="inputNombre" class="form-label">Nombre Completo:</label>
                        <input type="text" name="nombre" id="inputNombre" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                    <div class="col">
                        <label for="inputRut" class="form-label">Rut:</label>
                        <input type="text" name="rut" id="inputRut" class="form-control" onchange="validarRut(this)" />
                    </div>
                    <div class="col">
                        <label for="selectNacionalidad" class="form-label">Nacionalidad:</label>
                        <select name="nacionalidad" id="selectNacionalidad" class="form-select">
                            <option value="" selected>Seleccione su país...</option>
                        </select>
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputEmail" class="form-label">Correo Electrónico:</label>
                        <input type="email" name="email" id="inputEmail" class="form-control"
                            onchange="validarEmail(this)" />
                    </div>
                    <div class="col">
                        <label for="inputCelular" class="form-label">Celular Contacto:</label>
                        <input type="tel" name="celular" id="inputCelular" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                    <div class="col">
                        <label for="inputNacimiento" class="form-label">Fecha Nacimiento:</label>
                        <input type="date" name="fechaNacimiento" id="inputNacimiento" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputContrasena" class="form-label">Contraseña</label>
                        <input type="password" name="contrasena" id="inputContrasena" class="form-control"
                            onchange="validarContrasena(this)" />
                    </div>

                    <div class="col">
                        <label for="inputRepetirContrasena" class="form-label">Repetir Contraseña</label>
                        <input type="password" name="contrasena" id="inputRepetirContrasena" class="form-control"
                            onchange="validarConfirmarContrasena(this,document.getElementById('inputContrasena'))" />
                    </div>

                    <div class="col">
                        <label for="inputFoto" class="form-label">Foto Personal:</label>
                        <input type="file" name="foto" id="inputFoto" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                </div>
                <br />

                <p class="h5">Dirección</p>
                <hr>
                <br>

                <div class="row">
                    <div class="col">
                        <label for="inputComuna" class="form-label">Comuna:</label>
                        <input type="text" name="comuna" id="inputComuna" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                    
                    <div class="col">
                        <label for="inputCalle" class="form-label">Calle:</label>
                        <input type="text" name="calle" id="inputCalle" class="form-control"
                            onchange="validarInput(this)" />
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col">
                        <label for="inputNumero" class="form-label">Número:</label>
                        <input type="text" name="numero" id="inputNumero" class="form-control"/>
                    </div>
                    
                    <div class="col">
                        <label for="inputDepartamento" class="form-label">Departamento/Oficina:</label>
                        <input type="text" name="departamento" id="inputDepartamento" class="form-control"/>
                    </div>
                </div>
                <br />

                <div class="row">
                    <div class="col d-flex justify-content-end">
                        <input type="reset" value="Cancelar" class="btn btn-secondary me-2" />
                        <!-- <input type="submit" value="Enviar" class="btn btn-primary"> -->
                        <button type="button" class="btn btn-primary" onclick="validarFormulario()">
                            Enviar
                        </button>
                    </div>
                </div>
            </div>
        </form>
    </div>
</body>

</html>
